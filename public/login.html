<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Supervisión 16</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F7F8FA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border: 1px solid #E2E6EC;
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #6B7280;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }

    input:focus { border-color: #1A56DB; }

    button {
      width: 100%;
      padding: 10px;
      background: #1A56DB;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover { background: #1446B8; }

    .error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #B91C1C;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Dirección General de Escuelas</p>
    <h1>Supervisión 16</h1>

    <div class="error" id="error">
      Usuario o contraseña incorrectos.
    </div>

    <form method="POST" action="/login">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" autocomplete="username" required />

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <button type="submit">Ingresar</button>
    </form>
  </div>

  <script>
    // Muestra error si viene ?error=1 en la URL
    if (new URLSearchParams(window.location.search).get('error') === '1') {
      document.getElementById('error').classList.add('visible');
    }
  </script>
</body>
</html>
