<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repositorios — Supervisión 16</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F7F8FA;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #E2E6EC;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left .eyebrow {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #6B7280;
      margin-bottom: 4px;
    }

    .header-left h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .header-left h1 span { color: #1A56DB; }

    a.logout {
      font-size: 13px;
      color: #6B7280;
      text-decoration: none;
    }

    a.logout:hover { color: #111827; }

    main {
      max-width: 700px;
      margin: 48px auto;
      padding: 0 24px;
    }

    h2 {
      font-size: 14px;
      font-weight: 500;
      color: #6B7280;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .repositorios {
      display: grid;
      gap: 12px;
    }

    .repo-card {
      background: #fff;
      border: 1px solid #E2E6EC;
      border-radius: 8px;
      padding: 20px 24px;
      text-decoration: none;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color .15s, box-shadow .15s;
    }

    .repo-card:hover {
      border-color: #1A56DB;
      box-shadow: 0 0 0 3px #EEF3FF;
    }

    .repo-card .año {
      font-size: 20px;
      font-weight: 600;
      color: #1A56DB;
    }

    .repo-card .desc {
      font-size: 13px;
      color: #6B7280;
      margin-top: 2px;
    }

    .repo-card .arrow {
      font-size: 20px;
      color: #D1D5DB;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <p class="eyebrow">Dirección General de Escuelas</p>
    <h1>Repositorio Documental — <span>Supervisión 16</span></h1>
  </div>
  <a href="/logout" class="logout">Cerrar sesión</a>
</header>

<main>
  <h2>Seleccioná un repositorio</h2>
  <div class="repositorios">
    <a href="/repositorio.html?año=2012" class="repo-card">
      <div>
        <div class="año">2012</div>
        <div class="desc">Resoluciones y documentación del año 2012</div>
      </div>
      <span class="arrow">›</span>
    </a>
    <a href="/repositorio.html?año=2013" class="repo-card">
      <div>
        <div class="año">2013</div>
        <div class="desc">Resoluciones y documentación del año 2013</div>
      </div>
      <span class="arrow">›</span>
    </a>
    <a href="/repositorio.html?año=2014" class="repo-card">
      <div>
        <div class="año">2014</div>
        <div class="desc">Resoluciones y documentación del año 2014</div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
</main>

</body>
</html>
